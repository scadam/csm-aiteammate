# yaml-language-server: $schema=https://aka.ms/m365-agents-toolkits/v1.10/yaml.schema.json
version: v1.10

# Publish the CSM Autopilot Teams app package to the tenant. Provisioning of the
# agent's Entra identity (blueprint) and Agent 365 wiring is done with the `a365`
# CLI (see A365_SDK_AND_CLI_GUIDE.md), not here.
publish:
  - uses: teamsApp/zipAppPackage
    with:
      manifestPath: ./appPackage/manifest.json
      outputZipPath: ./appPackage/build/csm-autopilot.${{TEAMSFX_ENV}}.zip
      outputFolder: ./appPackage/build
  - uses: teamsApp/update
    with:
      appPackagePath: ./appPackage/build/csm-autopilot.${{TEAMSFX_ENV}}.zip
  - uses: teamsApp/publishAppPackage
    with:
      appPackagePath: ./appPackage/build/csm-autopilot.${{TEAMSFX_ENV}}.zip
    writeToEnvironmentFile:
      publishedAppId: TEAMS_APP_PUBLISHED_APP_ID

projectId: 5b4d9119-d5ac-4431-8729-a6b0693f1da4
